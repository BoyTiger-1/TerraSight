{% extends "base.html" %}
{% block title %}Page not found | TerraSight{% endblock %}

{% block content %}
<div class="wrap">
  <div class="notfound">
    <div>
      <div class="code">404</div>
      <h1 style="font-size: clamp(22px, 3vw, 32px)">This page is off the map.</h1>
      <p class="muted mt-2">The address you followed does not exist. The hazards, thankfully, are all still where we track them.</p>
      <div class="hero-ctas">
        <a class="btn btn-primary" href="/">Back to the homepage <svg width="16" height="16"><use href="#i-arrow"/></svg></a>
        <a class="btn btn-ghost" href="/dashboard">Open the Command Center</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
