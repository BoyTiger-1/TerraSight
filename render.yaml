services:
  - type: web
    name: terrasight-climate-intelligence
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --threads 4 --timeout 120
    region: oregon
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SECRET_KEY
        generateValue: true
